<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIC Mechanism Visualiser</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --border: #d0d0d0;
  --accent: #000000;
  --text: #222222;
  --muted: #888;
  --warn: #cc3333;
  --ok: #2a8a2a;
}
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: 'Open Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
@media (max-width: 700px) { body { overflow: auto; } .layout { overflow: visible; } .sidebar { overflow-y: visible; } }
header { padding: 9px 16px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 12px; background: white; flex-shrink: 0; }
header h1 { font-family: 'Open Sans', sans-serif; font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; color: var(--accent); }
header span { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.layout { display: flex; flex: 1; min-height: 0; overflow: hidden; }
.sidebar { width: 270px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; padding: 10px 12px; background: white; display: flex; flex-direction: column; gap: 0; }
.section-label { font-size: 0.55rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 3px; margin-bottom: 6px; margin-top: 11px; }
.section-label:first-child { margin-top: 0; }
.field { margin-bottom: 5px; }
.field label { display: block; font-size: 0.6rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
.field input[type="number"], .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'Open Sans', sans-serif; font-size: 0.78rem; padding: 4px 7px; border-radius: 4px; transition: border-color 0.15s; }
.field input[type="number"]:focus, .field select:focus { outline: none; border-color: var(--accent); }
.checkbox-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-size: 0.65rem; color: var(--text); cursor: pointer; }
.checkbox-row input[type="checkbox"] { width: 13px; height: 13px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
.preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 6px; }
.preset-btn { background: var(--bg); border: 1px solid var(--border); color: var(--muted); font-family: 'Open Sans', sans-serif; font-size: 0.6rem; letter-spacing: 0.05em; padding: 4px 2px; border-radius: 4px; cursor: pointer; transition: all 0.15s; text-align: center; }
.preset-btn:hover { border-color: var(--accent); color: var(--accent); }
.preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.row2 { display: flex; gap: 5px; }
.row2 .field { flex: 1; }
.info-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 10px; margin-top: 10px; font-size: 0.7rem; line-height: 1.9; }
.info-row { display: flex; justify-content: space-between; }
.info-row .lbl { color: var(--muted); }
.info-row .val { color: var(--text); }
.info-row .val.warn { color: var(--warn); }
.info-row .val.ok { color: var(--ok); }
.alert { border-radius: 4px; padding: 7px 9px; font-size: 0.67rem; line-height: 1.5; margin-top: 6px; }
.alert.warn { background: rgba(204,51,51,0.07); border: 1px solid rgba(204,51,51,0.3); color: #b02020; }
.alert.ok { background: rgba(42,138,42,0.07); border: 1px solid rgba(42,138,42,0.25); color: #1a6a1a; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); min-width: 0; position: relative; }
.view-toggle { display: flex; margin: 12px 0 0 12px; background: white; border: 1px solid var(--border); border-radius: 20px; padding: 3px; flex-shrink: 0; position: absolute; top: 0; left: 0; z-index: 10; cursor: pointer; user-select: none; }
.pill-track { position: relative; display: flex; border-radius: 16px; overflow: hidden; }
.pill-slider { position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: var(--accent); border-radius: 16px; transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); z-index: 0; }
.pill-slider.right { transform: translateX(100%); }
.view-btn { position: relative; z-index: 1; padding: 5px 18px; font-family: 'Open Sans', sans-serif; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; background: transparent; border: none; color: var(--muted); cursor: pointer; border-radius: 16px; transition: color 0.2s; pointer-events: none; display: flex; align-items: center; justify-content: center; }
.view-btn.active { color: #fff; }
.input-reset-wrap { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: var(--bg); transition: border-color 0.15s; }
.input-reset-wrap:focus-within { border-color: var(--accent); }
.input-reset-wrap input[type="number"] { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Open Sans', sans-serif; font-size: 0.78rem; padding: 4px 7px; width: 0; }
.reset-side-btn { display: none; align-items: center; justify-content: center; width: 26px; background: transparent; border: none; border-right: 1px solid var(--border); color: var(--muted); font-size: 0.9rem; cursor: pointer; transition: background 0.15s, color 0.15s; flex-shrink: 0; order: -1; }
.reset-side-btn.visible { display: flex; }
.reset-side-btn:hover { background: var(--accent); color: #fff; }
.analysis-panel { position: absolute; top: 52px; left: 12px; z-index: 10; background: white; border: 1px solid var(--border); border-radius: 6px; padding: 10px; width: 230px; font-size: 0.7rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
canvas#vis { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<header>
  <h1>PIC MECHANISM VISUALISER</h1>
  <span>Future Automation</span>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="section-label">Mechanism Preset</div>
    <div class="preset-grid" id="presetGrid"></div>
    <div class="section-label">Moving Frame (light grey)</div>
    <div class="row2">
      <div class="field">
        <label>Width (mm)</label>
        <input type="number" id="frameW" value="758" min="10">
      </div>
      <div class="field">
        <label>Height (mm)</label>
        <input type="number" id="frameH" value="718" min="10">
      </div>
    </div>
    <div class="field">
      <label>Travel (mm)</label>
      <input type="number" id="travel" value="560" min="0">
    </div>
    <div class="section-label">Canvas (PIC) Size</div>
    <div class="row2">
      <div class="field">
        <label>Width (mm)</label>
        <input type="number" id="canvW" value="850" min="10">
      </div>
      <div class="field">
        <label>Height (mm)</label>
        <input type="number" id="canvH" value="720" min="10">
      </div>
    </div>
    <div class="field">
      <label>Canvas Frame Thickness (mm)</label>
      <input type="number" id="canvFrame" value="44" min="1" max="200">
    </div>
    <label class="checkbox-row">
      <input type="checkbox" id="hookTop" checked>
      Hook canvas to inside top edge of moving frame
    </label>
    <div class="section-label">Motor Tube</div>
    <div class="row2">
      <div class="field">
        <label>Width (mm)</label>
        <div class="input-reset-wrap">
          <input type="number" id="motorTubeW" min="10">
          <button class="reset-side-btn" id="motorTubeWReset" title="Reset to default">&#x21BA;</button>
        </div>
      </div>
      <div class="field">
        <label>Height (mm)</label>
        <div class="input-reset-wrap">
          <input type="number" id="motorTubeH" min="1">
          <button class="reset-side-btn" id="motorTubeHReset" title="Reset to default">&#x21BA;</button>
        </div>
      </div>
    </div>
    <div class="field">
      <label>Motor bottom to frame bottom distance (mm)</label>
      <div class="input-reset-wrap">
        <input type="number" id="motorOffset" value="35" min="35">
        <button class="reset-side-btn" id="motorOffsetReset" title="Reset to default (35mm)">&#x21BA;</button>
      </div>
    </div>
    <div class="field">
      <label>Cassette bottom to aperture top — offset (mm)</label>
      <div class="input-reset-wrap">
        <input type="number" id="motorToApertureOffset" value="0">
        <button class="reset-side-btn" id="motorToApertureOffsetReset" title="Reset to 0mm">&#x21BA;</button>
      </div>
    </div>
    <div class="section-label">TV / Display</div>
    <div class="field">
      <label>Select by diagonal</label>
      <select id="tvDiag"></select>
    </div>
    <div class="row2">
      <div class="field">
        <label>TV Width (mm)</label>
        <input type="number" id="tvW" value="708" min="0">
      </div>
      <div class="field">
        <label>TV Height (mm)</label>
        <input type="number" id="tvH" value="398" min="0">
      </div>
    </div>
    <div class="field">
      <label>Aperture Thickness (mm)</label>
      <input type="number" id="apertureThick" value="30" min="0">
    </div>
    <label class="checkbox-row">
      <input type="checkbox" id="displayAbove">
      Mount display above motor tube (aperture sits above motor, frame moves up to cover TV)
    </label>
    <div style="margin-top:9px;">
      <button id="exportProofBtn" style="width:100%;background:#000;color:#fff;border:none;border-radius:4px;padding:9px 0;font-family:'Open Sans',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.15s;" onmouseover="this.style.background='#333'" onmouseout="this.style.background='#000'">&#8681; Export Mechanism Proof</button>
    </div>
  </aside>
  <main class="main">
    <div class="view-toggle" onclick="togglePosition()" id="pillToggle">
      <div class="pill-track">
        <div class="pill-slider" id="pillSlider"></div>
        <button class="view-btn active" id="btnUp">UP</button>
        <button class="view-btn" id="btnDown">DOWN</button>
      </div>
    </div>
    <div class="analysis-panel" id="analysisPanel">
      <div class="section-label" style="margin-top:0">Analysis</div>
      <div class="info-box" id="infoBox"></div>
      <div id="alerts"></div>
    </div>
    <canvas id="vis"></canvas>
  </main>
</div>
<script>
let CANVAS_FRAME = 44;
const FRAME_STROKE = 20;
const PIC_MOTOR_W = 797;
const PIC_MOTOR_H = 82;
const PIC_MOTOR_TO_APERTURE = 94;
const PICH_MOTOR_W = 1000;
const PICH_MOTOR_H = 134;
const PICH_MOTOR_TO_APERTURE = 79;
const PRESETS = [
  { name:'PIC1', frameW:758, frameH:718, travel:560, canvW:850, canvH:720 },
  { name:'PIC2', frameW:758, frameH:868, travel:710, canvW:850, canvH:870 },
  { name:'PIC3', frameW:758, frameH:1018, travel:860, canvW:850, canvH:1020 },
  { name:'PIC-H1', frameW:1012, frameH:910, travel:710, canvW:1055, canvH:910 },
  { name:'PIC-H2', frameW:1012, frameH:1060, travel:860, canvW:1055, canvH:1060 },
  { name:'PIC-H3', frameW:1012, frameH:1210, travel:1010, canvW:1055, canvH:1210 },
];
function buildTVSelector() {
  const sel = document.getElementById('tvDiag');
  sel.innerHTML = '<option value="0">Custom</option>';
  for (let d = 1; d <= 98; d++) {
    const diagMM = d * 25.4;
    const w = Math.round(diagMM * 16 / 9 / Math.sqrt(1 + (16/9)**2));
    const h = Math.round(diagMM / Math.sqrt(1 + (16/9)**2));
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d + '" — ' + w + ' x ' + h + ' mm';
    opt.dataset.w = w;
    opt.dataset.h = h;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', () => {
    const opt = sel.options[sel.selectedIndex];
    if (opt.dataset.w) {
      document.getElementById('tvW').value = opt.dataset.w;
      document.getElementById('tvH').value = opt.dataset.h;
      applyTVWidthToCanvas();
      updateInfo(); draw();
    }
  });
}
let animT = 0;
let animTarget = 0;
let animRAF = null;
let activePreset = 'PIC1';
let forcePICH = false;
let motorTubeWOverride = null;
let motorTubeHOverride = null;
let motorToApertureOffsetOverride = null;
function g(id) { return parseFloat(document.getElementById(id).value) || 0; }
function s(id, v) { document.getElementById(id).value = v; }
function togglePosition() {
  const newTarget = animTarget === 0 ? 1 : 0;
  setPosition(newTarget);
}
function setPosition(target) {
  animTarget = target;
  document.getElementById('btnUp').classList.toggle('active', target === 0);
  document.getElementById('btnDown').classList.toggle('active', target === 1);
  document.getElementById('pillSlider').classList.toggle('right', target === 1);
  if (animRAF) cancelAnimationFrame(animRAF);
  const DURATION = 600;
  const startT = animT;
  const endT = animTarget;
  let startTime = null;
  function step(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const progress = Math.min(elapsed / DURATION, 1);
    const ease = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
    animT = startT + (endT - startT) * ease;
    drawFrame(animT);
    if (progress < 1) animRAF = requestAnimationFrame(step);
    else { animRAF = null; animT = endT; }
  }
  animRAF = requestAnimationFrame(step);
}
function buildPresets() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = '';
  PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (p.name === activePreset ? ' active' : '');
    btn.textContent = p.name;
    btn.onclick = () => {
      activePreset = p.name;
      s('frameW', p.frameW); s('frameH', p.frameH); s('travel', p.travel);
      const tvW = parseFloat(document.getElementById('tvW').value) || 0;
      const apertureThick = parseFloat(document.getElementById('apertureThick').value) || 0;
      const apertureW = tvW + apertureThick * 2;
      s('canvW', apertureW > p.canvW ? apertureW : p.canvW);
      s('canvH', p.canvH);
      forcePICH = p.name.startsWith('PIC-H');
      motorTubeWOverride = null; motorTubeHOverride = null; motorToApertureOffsetOverride = null;
      buildPresets(); syncMotorTubeFields(); updateInfo(); draw();
    };
    grid.appendChild(btn);
  });
  const custom = document.createElement('button');
  custom.className = 'preset-btn' + (activePreset === 'CUSTOM' ? ' active' : '');
  custom.textContent = 'CUSTOM';
  custom.onclick = () => { 
    activePreset = 'CUSTOM'; 
    forcePICH = isPICH();
    buildPresets(); 
  };
  grid.appendChild(custom);
}
function isPICH() {
  return forcePICH || activePreset === 'PIC-H1' || activePreset === 'PIC-H2' || activePreset === 'PIC-H3';
}
function getCalc() {
  CANVAS_FRAME = parseFloat(document.getElementById('canvFrame').value) || 44;
  const frameW = g('frameW');
  const frameH = g('frameH');
  const travel = g('travel');
  const canvW = g('canvW');
  const canvH = g('canvH');
  const tvW = g('tvW');
  const tvH = g('tvH');
  const apertureThick = Math.max(0, g('apertureThick') || 5);
  const hookTop = document.getElementById('hookTop').checked;
  const displayAbove = document.getElementById('displayAbove').checked;
  const pich = isPICH();
  const defaultMotorW = pich ? PICH_MOTOR_W : PIC_MOTOR_W;
  const defaultMotorH = pich ? PICH_MOTOR_H : PIC_MOTOR_H;
  const motorW = (motorTubeWOverride !== null) ? motorTubeWOverride : defaultMotorW;
  const motorH = (motorTubeHOverride !== null) ? motorTubeHOverride : defaultMotorH;
  const motorOffset = parseFloat(document.getElementById('motorOffset').value) || 35;
  const motorToApertureBase = (pich ? PICH_MOTOR_TO_APERTURE : PIC_MOTOR_TO_APERTURE) + (CANVAS_FRAME - 44);
  const motorToApertureOffset = motorToApertureOffsetOverride !== null ? motorToApertureOffsetOverride : 0;
  const outerCanvW = canvW + CANVAS_FRAME * 2;
  const outerCanvH = canvH + CANVAS_FRAME * 2;
  const coverageH = outerCanvH + travel;
  const needsCrossBrace = (canvH - frameH) > 50;
  const canvOverflowBelowFrame = (!displayAbove && hookTop && canvH > frameH) ? (canvH - frameH) : 0;
  const canvOverflowAboveFrame = (displayAbove && !hookTop && canvH > frameH) ? (canvH - frameH) : 0;
  const actualMotorToAperture = motorToApertureBase + 5 + canvOverflowBelowFrame + canvOverflowAboveFrame + motorToApertureOffset;
  return {
    frameW, frameH, travel, canvW, canvH, tvW, tvH, apertureThick,
    outerCanvW, outerCanvH, coverageH, hookTop, displayAbove,
    motorW, motorH, motorOffset, motorToApertureBase, motorToApertureOffset, actualMotorToAperture, pich,
    needsCrossBrace
  };
}
function updateInfo() {
  const c = getCalc();
  const box = document.getElementById('infoBox');
  const alerts = document.getElementById('alerts');
  const apertureW = c.tvW > 0 ? c.tvW + c.apertureThick * 2 : 0;
  const apertureH = c.tvH > 0 ? c.tvH + c.apertureThick * 2 : 0;
  const hookTop = c.hookTop;
  const bar_mm = CANVAS_FRAME;
  const canvTopRelFrame_mm = hookTop ? -bar_mm : c.frameH - c.outerCanvH + bar_mm;
  const canvBottomUp_mm = canvTopRelFrame_mm + c.outerCanvH;
  const pich = isPICH();
  const motorH = c.motorH;
  const frameBottomUp_mm = c.frameH;
  const motorBottomFixed_mm = frameBottomUp_mm - c.motorOffset;
  const motorFixedTop_mm = motorBottomFixed_mm - motorH;
  const actualMotorToAperture = c.actualMotorToAperture;
  let apertureFixedTop_mm, requiredTravel, coverageOk;
  if (!c.displayAbove) {
    const minApertureFromMotor_mm = motorBottomFixed_mm + actualMotorToAperture;
    const apertureFromCanvas_mm = canvBottomUp_mm + CANVAS_FRAME;
    apertureFixedTop_mm = Math.max(minApertureFromMotor_mm, apertureFromCanvas_mm);
    const apertureBottom_mm = apertureFixedTop_mm + apertureH;
    const distance = apertureBottom_mm - canvBottomUp_mm;
    requiredTravel = distance + CANVAS_FRAME;
    coverageOk = c.travel >= requiredTravel;
  } else {
    const apertureBottom_above = motorFixedTop_mm - actualMotorToAperture;
    apertureFixedTop_mm = apertureBottom_above - apertureH;
    const canvTopRelFrame = hookTop ? -bar_mm : c.frameH - c.outerCanvH + bar_mm;
    const canvTopUp_mm = canvTopRelFrame;
    requiredTravel = canvTopUp_mm - apertureFixedTop_mm + CANVAS_FRAME;
    coverageOk = canvTopUp_mm <= apertureFixedTop_mm - CANVAS_FRAME;
  }
  const rows = [
    { label:'Canvas Width (inner)', val: c.canvW + 'mm' },
    { label:'Canvas Height (inner)', val: c.canvH + 'mm' },
    { label:'Aperture Width', val: apertureW ? apertureW + 'mm' : '-' },
    { label:'Aperture Height', val: apertureH ? apertureH + 'mm' : '-' },
    { label:'Aperture To Motor', val: Math.round(actualMotorToAperture) + 'mm' },
    { label:'Travel', val: c.travel + 'mm' },
    { label:'Total Coverage Height', val: c.coverageH.toFixed(0) + 'mm' },
  ];
  box.innerHTML = rows.map(r =>
    '<div class="info-row"><span class="lbl">' + r.label + '</span><span class="val">' + r.val + '</span></div>'
  ).join('');
  let alertHTML = '';
  if (c.tvW > 0 && c.tvH > 0) {
    if (c.displayAbove) {
      if (coverageOk) {
        alertHTML += `<div class="alert ok">Coverage: canvas top covers aperture top by ${CANVAS_FRAME}mm+ in the up position.</div>`;
      } else {
        const shortfall = Math.round(requiredTravel);
        alertHTML += `<div class="alert warn" style="background:rgba(204,51,51,0.15);border-color:rgba(204,51,51,0.6);">Coverage: canvas top does not reach aperture top in the up position — canvas needs to extend ${shortfall}mm higher.</div>`;
      }
    } else {
      if (coverageOk) {
        alertHTML += `<div class="alert ok">Coverage: travel (${c.travel}mm) is sufficient to cover the aperture by ${CANVAS_FRAME}mm+ (needs ${Math.round(requiredTravel)}mm).</div>`;
      } else {
        alertHTML += `<div class="alert warn" style="background:rgba(204,51,51,0.15);border-color:rgba(204,51,51,0.6);">Coverage: travel (${c.travel}mm) is too short — needs ${Math.round(requiredTravel)}mm to cover the aperture.</div>`;
      }
    }
    if (c.canvW < apertureW) {
      alertHTML += `<div class="alert warn" style="background:rgba(204,51,51,0.15);border-color:rgba(204,51,51,0.6);">Width: aperture (${apertureW}mm) is wider than canvas inner width (${c.canvW}mm) — set canvas width to ${apertureW}mm to cover aperture edges.</div>`;
    }
  }
  if (c.needsCrossBrace) {
    alertHTML += '<div class="alert ok">Cross brace added (canvas >50mm taller than moving frame).</div>';
  }
  alerts.innerHTML = alertHTML;
}
function draw() { drawFrame(animT); }
function drawFrame(t) {
  updateInfo();
  const c = getCalc();
  const cnv = document.getElementById('vis');
  const container = cnv.parentElement;
  const DPR = window.devicePixelRatio || 1;
  const fStroke_mm = FRAME_STROKE;
  const bar_mm = CANVAS_FRAME;
  const hookTop = c.hookTop;
  const displayAbove = c.displayAbove;
  const canvOffY_mm = hookTop ? -bar_mm : c.frameH - c.outerCanvH + bar_mm;
  const canvTopRelFrame_mm = canvOffY_mm;
  const motorH_mm = c.motorH;
  const motorW_mm = c.motorW;
  const actualMotorToAperture_mm = c.actualMotorToAperture;
  const frameTopAbs_mm = 0;
  const apertureH_mm = c.tvH > 0 ? c.tvH + c.apertureThick * 2 : 60;
  const apertureW_mm = c.tvW > 0 ? c.tvW + c.apertureThick * 2 : 100;
  const travelAbs_mm = t * c.travel;
  const frameMovedTop_mm = frameTopAbs_mm + travelAbs_mm;
  const canvMovedTop_mm = frameMovedTop_mm + canvTopRelFrame_mm;
  const frameBottomUp_mm = frameTopAbs_mm + c.frameH;
  const motorBottomFixed_mm = frameBottomUp_mm - c.motorOffset;
  const motorFixedTop_mm = motorBottomFixed_mm - motorH_mm;
  const canvBottomUp_mm = frameTopAbs_mm + canvTopRelFrame_mm + c.outerCanvH;
  let apertureFixedTop_mm, tvTop_mm;
  if (!displayAbove) {
