<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIC Mechanism Visualiser</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --border: #d0d0d0;
  --accent: #000000;
  --text: #222222;
  --muted: #888;
  --warn: #cc3333;
  --ok: #2a8a2a;
}
html, body { height: 100%; }
body { background: var(--bg); color: var(--text); font-family: 'Open Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
@media (max-width: 700px) { body { overflow: auto; } .layout { overflow: visible; } .sidebar { overflow-y: visible; } }
header { padding: 9px 16px 8px; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 12px; background: white; flex-shrink: 0; }
header h1 { font-family: 'Open Sans', sans-serif; font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; color: var(--accent); }
header span { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.layout { display: flex; flex: 1; min-height: 0; overflow: hidden; }
.sidebar { width: 270px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; padding: 10px 12px; background: white; display: flex; flex-direction: column; gap: 0; }
.section-label { font-size: 0.55rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 3px; margin-bottom: 6px; margin-top: 11px; }
.section-label:first-child { margin-top: 0; }
.field { margin-bottom: 5px; }
.field label { display: block; font-size: 0.6rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
.field input[type="number"], .field select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'Open Sans', sans-serif; font-size: 0.78rem; padding: 4px 7px; border-radius: 4px; transition: border-color 0.15s; }
.field input[type="number"]:focus, .field select:focus { outline: none; border-color: var(--accent); }
.checkbox-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; font-size: 0.65rem; color: var(--text); cursor: pointer; }
.checkbox-row input[type="checkbox"] { width: 13px; height: 13px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }
.preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 6px; }
.preset-btn { background: var(--bg); border: 1px solid var(--border); color: var(--muted); font-family: 'Open Sans', sans-serif; font-size: 0.6rem; letter-spacing: 0.05em; padding: 4px 2px; border-radius: 4px; cursor: pointer; transition: all 0.15s; text-align: center; }
.preset-btn:hover { border-color: var(--accent); color: var(--accent); }
.preset-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.row2 { display: flex; gap: 5px; }
.row2 .field { flex: 1; }
.info-box { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 10px; margin-top: 10px; font-size: 0.7rem; line-height: 1.9; }
.info-row { display: flex; justify-content: space-between; }
.info-row .lbl { color: var(--muted); }
.info-row .val { color: var(--text); }
.info-row .val.warn { color: var(--warn); }
.info-row .val.ok { color: var(--ok); }
.alert { border-radius: 4px; padding: 7px 9px; font-size: 0.67rem; line-height: 1.5; margin-top: 6px; }
.alert.warn { background: rgba(204,51,51,0.07); border: 1px solid rgba(204,51,51,0.3); color: #b02020; }
.alert.ok { background: rgba(42,138,42,0.07); border: 1px solid rgba(42,138,42,0.25); color: #1a6a1a; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); min-width: 0; position: relative; }
.view-toggle { display: flex; margin: 12px 0 0 12px; background: white; border: 1px solid var(--border); border-radius: 20px; padding: 3px; flex-shrink: 0; position: absolute; top: 0; left: 0; z-index: 10; cursor: pointer; user-select: none; }
.pill-track { position: relative; display: flex; border-radius: 16px; overflow: hidden; }
.pill-slider { position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: var(--accent); border-radius: 16px; transition: transform 0.25s cubic-bezier(0.4,0,0.2,1); z-index: 0; }
.pill-slider.right { transform: translateX(100%); }
.view-btn { position: relative; z-index: 1; padding: 5px 18px; font-family: 'Open Sans', sans-serif; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; background: transparent; border: none; color: var(--muted); cursor: pointer; border-radius: 16px; transition: color 0.2s; pointer-events: none; display: flex; align-items: center; justify-content: center; }
.view-btn.active { color: #fff; }
.input-reset-wrap { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; background: var(--bg); transition: border-color 0.15s; }
.input-reset-wrap:focus-within { border-color: var(--accent); }
.input-reset-wrap input[type="number"] { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Open Sans', sans-serif; font-size: 0.78rem; padding: 4px 7px; width: 0; }
.reset-side-btn { display: none; align-items: center; justify-content: center; width: 26px; background: transparent; border: none; border-right: 1px solid var(--border); color: var(--muted); font-size: 0.9rem; cursor: pointer; transition: background 0.15s, color 0.15s; flex-shrink: 0; order: -1; }
.reset-side-btn.visible { display: flex; }
.reset-side-btn:hover { background: var(--accent); color: #fff; }
.analysis-panel { position: absolute; top: 52px; left: 12px; z-index: 10; background: white; border: 1px solid var(--border); border-radius: 6px; padding: 10px; width: 230px; font-size: 0.7rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
canvas#vis { display: block; width: 100%; height: 100%; }
.hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <h1>PIC MECHANISM VISUALISER</h1>
  <span>Future Automation</span>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="section-label">Mechanism Preset</div>
    <div class="preset-grid" id="presetGrid"></div>
    <div class="section-label">Moving Frame (light grey)</div>
    <div class="row2">
      <div class="field">
        <label>Width (mm)</label>
        <input type="number" id="frameW" value="758" min="10">
      </div>
      <div class="field">
        <label>Height (mm)</label>
        <input type="number" id="frameH" value="718" min="10">
      </div>
    </div>
    <div class="field">
      <label>Travel (mm)</label>
      <input type="number" id="travel" value="560" min="0">
    </div>
    <div class="section-label">Canvas (PIC) Size</div>
    <div class="row2">
      <div class="field">
        <label>Width (mm)</label>
        <input type="number" id="canvW" value="850" min="10">
      </div>
      <div class="field">
        <label>Height (mm)</label>
        <input type="number" id="canvH" value="720" min="10">
      </div>
    </div>
    <div class="field">
      <label>Canvas Frame Thickness (mm)</label>
      <input type="number" id="canvFrame" value="44" min="1" max="200">
    </div>
    <label class="checkbox-row" id="hookTopRow">
      <input type="checkbox" id="hookTop" checked>
      <span id="hookTopLabel">Hook canvas to inside top edge of moving frame</span>
    </label>

    <!-- PIC/PICH only fields -->
    <div id="picOnlyFields">
      <div class="section-label">Motor Tube</div>
      <div class="row2">
        <div class="field">
          <label>Width (mm)</label>
          <div class="input-reset-wrap">
            <input type="number" id="motorTubeW" min="10">
            <button class="reset-side-btn" id="motorTubeWReset" title="Reset to default">&#x21BA;</button>
          </div>
        </div>
        <div class="field">
          <label>Height (mm)</label>
          <div class="input-reset-wrap">
            <input type="number" id="motorTubeH" min="1">
            <button class="reset-side-btn" id="motorTubeHReset" title="Reset to default">&#x21BA;</button>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Motor bottom to frame bottom distance (mm)</label>
        <div class="input-reset-wrap">
          <input type="number" id="motorOffset" value="35" min="35">
          <button class="reset-side-btn" id="motorOffsetReset" title="Reset to default (35mm)">&#x21BA;</button>
        </div>
      </div>
      <div class="field">
        <label id="plateToApertureLabel">Cassette bottom to aperture top — offset (mm)</label>
        <div class="input-reset-wrap">
          <input type="number" id="motorToApertureOffset" value="0">
          <button class="reset-side-btn" id="motorToApertureOffsetReset" title="Reset to 0mm">&#x21BA;</button>
        </div>
      </div>
    </div>

    <!-- PIC-SIDE only fields -->
    <div id="sideOnlyFields" class="hidden">
      <div class="section-label">Wall Plate</div>
      <div class="field">
        <label>Plate to aperture edge — offset (mm)</label>
        <div class="input-reset-wrap">
          <input type="number" id="sideApertureOffset" value="0">
          <button class="reset-side-btn" id="sideApertureOffsetReset" title="Reset to 0mm">&#x21BA;</button>
        </div>
      </div>
    </div>

    <div class="section-label">TV / Display</div>
    <div class="field">
      <label>Select by diagonal</label>
      <select id="tvDiag"></select>
    </div>
    <div class="row2">
      <div class="field">
        <label>TV Width (mm)</label>
        <input type="number" id="tvW" value="708" min="0">
      </div>
      <div class="field">
        <label>TV Height (mm)</label>
        <input type="number" id="tvH" value="398" min="0">
      </div>
    </div>
    <div class="field">
      <label>Aperture Thickness (mm)</label>
      <input type="number" id="apertureThick" value="30" min="0">
    </div>
    <label class="checkbox-row">
      <input type="checkbox" id="displayAbove">
      <span id="displayAboveLabel">Mount display above motor tube (aperture sits above motor, frame moves up to cover TV)</span>
    </label>
    <div style="margin-top:9px;">
      <button id="exportProofBtn" style="width:100%;background:#000;color:#fff;border:none;border-radius:4px;padding:9px 0;font-family:'Open Sans',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.15s;" onmouseover="this.style.background='#333'" onmouseout="this.style.background='#000'">&#8681; Export Mechanism Proof</button>
    </div>
  </aside>
  <main class="main">
    <div class="view-toggle" onclick="togglePosition()" id="pillToggle">
      <div class="pill-track">
        <div class="pill-slider" id="pillSlider"></div>
        <button class="view-btn active" id="btnUp">UP</button>
        <button class="view-btn" id="btnDown">DOWN</button>
      </div>
    </div>
    <div class="analysis-panel" id="analysisPanel">
      <div class="section-label" style="margin-top:0">Analysis</div>
      <div class="info-box" id="infoBox"></div>
      <div id="alerts"></div>
    </div>
    <canvas id="vis"></canvas>
  </main>
</div>
<script>
let CANVAS_FRAME = 44;
const FRAME_STROKE = 20;
const PIC_MOTOR_W = 797;
const PIC_MOTOR_H = 82;
const PIC_MOTOR_TO_APERTURE = 94;
const PICH_MOTOR_W = 1000;
const PICH_MOTOR_H = 134;
const PICH_MOTOR_TO_APERTURE = 79;
const PICSIDE_PLATE_W = 280;
const PICSIDE_PLATE_H = 650;
const PICSIDE_PLATE_TO_APERTURE = 44;

const PRESETS = [
  { name:'PIC1',     frameW:758,  frameH:718,  travel:560,  canvW:850,  canvH:720,  type:'pic' },
  { name:'PIC2',     frameW:758,  frameH:868,  travel:710,  canvW:850,  canvH:870,  type:'pic' },
  { name:'PIC3',     frameW:758,  frameH:1018, travel:860,  canvW:850,  canvH:1020, type:'pic' },
  { name:'PIC-H1',   frameW:1012, frameH:910,  travel:710,  canvW:1055, canvH:910,  type:'pich' },
  { name:'PIC-H2',   frameW:1012, frameH:1060, travel:860,  canvW:1055, canvH:1060, type:'pich' },
  { name:'PIC-H3',   frameW:1012, frameH:1210, travel:1010, canvW:1055, canvH:1210, type:'pich' },
  { name:'PIC-SIDE1',frameW:1468, frameH:700,  travel:1184, canvW:1468, canvH:700,  type:'side' },
];

function buildTVSelector() {
  const sel = document.getElementById('tvDiag');
  sel.innerHTML = '<option value="0">Custom</option>';
  for (let d = 1; d <= 98; d++) {
    const diagMM = d * 25.4;
    const w = Math.round(diagMM * 16 / 9 / Math.sqrt(1 + (16/9)**2));
    const h = Math.round(diagMM / Math.sqrt(1 + (16/9)**2));
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d + '" — ' + w + ' x ' + h + ' mm';
    opt.dataset.w = w;
    opt.dataset.h = h;
    sel.appendChild(opt);
  }
  sel.addEventListener('change', () => {
    const opt = sel.options[sel.selectedIndex];
    if (opt.dataset.w) {
      document.getElementById('tvW').value = opt.dataset.w;
      document.getElementById('tvH').value = opt.dataset.h;
      applyTVDimToCanvas();
      updateInfo(); draw();
    }
  });
}

let animT = 0;
let animTarget = 0;
let animRAF = null;
let activePreset = 'PIC1';
let forcePICH = false;
let forceSIDE = false;
let motorTubeWOverride = null;
let motorTubeHOverride = null;
let motorToApertureOffsetOverride = null;
let sideApertureOffsetOverride = null;

function g(id) { return parseFloat(document.getElementById(id).value) || 0; }
function s(id, v) { document.getElementById(id).value = v; }

function isSIDE() {
  return forceSIDE || activePreset === 'PIC-SIDE1';
}
function isPICH() {
  return !isSIDE() && (forcePICH || activePreset === 'PIC-H1' || activePreset === 'PIC-H2' || activePreset === 'PIC-H3');
}

function updateSidebarForMode() {
  const side = isSIDE();
  document.getElementById('picOnlyFields').classList.toggle('hidden', side);
  document.getElementById('sideOnlyFields').classList.toggle('hidden', !side);
  document.getElementById('hookTopLabel').textContent = side
    ? 'Hook canvas to inside top edge of moving frame'
    : 'Hook canvas to inside top edge of moving frame';
  document.getElementById('displayAboveLabel').textContent = side
    ? 'Mount display to the left of wall plate (canvas moves left to cover TV)'
    : 'Mount display above motor tube (aperture sits above motor, frame moves up to cover TV)';
  const btnUp = document.getElementById('btnUp');
  const btnDown = document.getElementById('btnDown');
  btnUp.textContent = side ? 'LEFT' : 'UP';
  btnDown.textContent = side ? 'RIGHT' : 'DOWN';
}

function togglePosition() {
  const newTarget = animTarget === 0 ? 1 : 0;
  setPosition(newTarget);
}
function setPosition(target) {
  animTarget = target;
  document.getElementById('btnUp').classList.toggle('active', target === 0);
  document.getElementById('btnDown').classList.toggle('active', target === 1);
  document.getElementById('pillSlider').classList.toggle('right', target === 1);
  if (animRAF) cancelAnimationFrame(animRAF);
  const DURATION = 600;
  const startT = animT;
  const endT = animTarget;
  let startTime = null;
  function step(ts) {
    if (!startTime) startTime = ts;
    const elapsed = ts - startTime;
    const progress = Math.min(elapsed / DURATION, 1);
    const ease = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
    animT = startT + (endT - startT) * ease;
    drawFrame(animT);
    if (progress < 1) animRAF = requestAnimationFrame(step);
    else { animRAF = null; animT = endT; }
  }
  animRAF = requestAnimationFrame(step);
}

function buildPresets() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = '';
  PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn' + (p.name === activePreset ? ' active' : '');
    btn.textContent = p.name;
    btn.onclick = () => {
      activePreset = p.name;
      s('frameW', p.frameW); s('frameH', p.frameH); s('travel', p.travel);
      const tvW = parseFloat(document.getElementById('tvW').value) || 0;
      const apertureThick = parseFloat(document.getElementById('apertureThick').value) || 0;
      const apertureW = tvW + apertureThick * 2;
      s('canvW', apertureW > p.canvW ? apertureW : p.canvW);
      s('canvH', p.canvH);
      forcePICH = p.type === 'pich';
      forceSIDE = p.type === 'side';
      motorTubeWOverride = null; motorTubeHOverride = null; motorToApertureOffsetOverride = null; sideApertureOffsetOverride = null;
      buildPresets(); syncMotorTubeFields(); updateSidebarForMode(); updateInfo(); draw();
    };
    grid.appendChild(btn);
  });
}

function getCalc() {
  CANVAS_FRAME = parseFloat(document.getElementById('canvFrame').value) || 44;
  const frameW = g('frameW');
  const frameH = g('frameH');
  const travel = g('travel');
  const canvW = g('canvW');
  const canvH = g('canvH');
  const tvW = g('tvW');
  const tvH = g('tvH');
  const apertureThick = Math.max(0, g('apertureThick') || 5);
  const hookTop = document.getElementById('hookTop').checked;
  const displayAbove = document.getElementById('displayAbove').checked;
  const side = isSIDE();
  const pich = isPICH();

  if (side) {
    const outerCanvW = canvW + CANVAS_FRAME * 2;
    const outerCanvH = canvH + CANVAS_FRAME * 2;
    const plateToApertureBase = Math.max(25, CANVAS_FRAME);
    const plateToApertureOffset = sideApertureOffsetOverride !== null ? sideApertureOffsetOverride : 0;
    const plateToAperture = plateToApertureBase + plateToApertureOffset;
    const canvExtraH = canvH - frameH;
    const needsHorizBrace = canvExtraH > 50;
    const canvExtraW = canvW - frameW;
    const needsVertBrace = canvExtraW > 200;
    return {
      frameW, frameH, travel, canvW, canvH, tvW, tvH, apertureThick,
      outerCanvW, outerCanvH, hookTop, displayAbove, side: true, pich: false,
      plateToAperture, plateToApertureOffset,
      needsHorizBrace, needsVertBrace, canvExtraH, canvExtraW,
      motorW: 0, motorH: 0, motorOffset: 0, actualMotorToAperture: 0
    };
  }

  const defaultMotorW = pich ? PICH_MOTOR_W : PIC_MOTOR_W;
  const defaultMotorH = pich ? PICH_MOTOR_H : PIC_MOTOR_H;
  const motorW = (motorTubeWOverride !== null) ? motorTubeWOverride : defaultMotorW;
  const motorH = (motorTubeHOverride !== null) ? motorTubeHOverride : defaultMotorH;
  const motorOffset = parseFloat(document.getElementById('motorOffset').value) || 35;
  const motorToApertureBase = (pich ? PICH_MOTOR_TO_APERTURE : PIC_MOTOR_TO_APERTURE) + (CANVAS_FRAME - 44);
  const motorToApertureOffset = motorToApertureOffsetOverride !== null ? motorToApertureOffsetOverride : 0;
  const outerCanvW = canvW + CANVAS_FRAME * 2;
  const outerCanvH = canvH + CANVAS_FRAME * 2;
  const coverageH = outerCanvH + travel;
  const needsCrossBrace = (canvH - frameH) > 50;
  const canvOverflowBelowFrame = (!displayAbove && hookTop && canvH > frameH) ? (canvH - frameH) : 0;
  const canvOverflowAboveFrame = (displayAbove && !hookTop && canvH > frameH) ? (canvH - frameH) : 0;
  const actualMotorToAperture = motorToApertureBase + 5 + canvOverflowBelowFrame + canvOverflowAboveFrame + motorToApertureOffset;
  return {
    frameW, frameH, travel, canvW, canvH, tvW, tvH, apertureThick,
    outerCanvW, outerCanvH, coverageH, hookTop, displayAbove, side: false, pich,
    motorW, motorH, motorOffset, motorToApertureBase, motorToApertureOffset, actualMotorToAperture,
    needsCrossBrace, needsHorizBrace: needsCrossBrace, needsVertBrace: false
  };
}

function updateInfo() {
  const c = getCalc();
  const box = document.getElementById('infoBox');
  const alerts = document.getElementById('alerts');
  const apertureW = c.tvW > 0 ? c.tvW + c.apertureThick * 2 : 0;
  const apertureH = c.tvH > 0 ? c.tvH + c.apertureThick * 2 : 0;
  const MIN_EDGE_COVERAGE = 25;
  const MIN_SIDE_COVERAGE = 44;

  let alertHTML = '';
  let rows = [];

  if (c.side) {
    const bar = CANVAS_FRAME;
    const MIN_HORIZ_COVERAGE = bar;
    const MIN_HORIZ_COVERAGE_WARN = MIN_SIDE_COVERAGE;

    const actualCoverage = Math.round(c.travel + bar - c.plateToAperture - apertureW);
    const coverageOk = actualCoverage >= MIN_HORIZ_COVERAGE_WARN;
    const coverageTight = coverageOk && actualCoverage < MIN_HORIZ_COVERAGE;

    const topOverlap = Math.round((c.outerCanvH - apertureH) / 2);
    const topCoverageOk = topOverlap >= MIN_EDGE_COVERAGE;
    const topCoverageTight = topCoverageOk && topOverlap < bar;

    rows = [
      { label:'Canvas Width (inner)', val: c.canvW + 'mm' },
      { label:'Canvas Height (inner)', val: c.canvH + 'mm' },
      { label:'Aperture Width', val: apertureW ? apertureW + 'mm' : '-' },
      { label:'Aperture Height', val: apertureH ? apertureH + 'mm' : '-' },
      { label:'Plate to Aperture', val: Math.round(c.plateToAperture) + 'mm' },
      { label:'Travel', val: c.travel + 'mm' },
      { label:'Total Coverage Width', val: (c.outerCanvW + c.travel) + 'mm' },
    ];

    if (c.tvW > 0 && c.tvH > 0) {
      if (coverageOk) {
        alertHTML += `<div class="alert ${coverageTight ? 'warn' : 'ok'}">${coverageTight ? `L/R Coverage: only ${actualCoverage}mm past aperture edge — less than the recommended ${bar}mm.` : `L/R Coverage: travel sufficient — ${actualCoverage}mm past aperture edge.`}</div>`;
      } else {
        alertHTML += `<div class="alert warn" style="background:rgba(204,51,51,0.15);border-color:rgba(204,51,51,0.6);">L/R Coverage: insufficient — only ${actualCoverage}mm past aperture edge. Minimum is ${MIN_HORIZ_COVERAGE_WARN}mm, recommended ${bar}mm.</div>`;
      }
      if (apertureH > 0) {
        if (!topCoverageOk) {
          alertHTML += `<div class="alert warn" style="background:rgba(204,51,51,0.15);border-color:rgba(204,51,51,0.6);">Top/Bottom: canvas height (${c.canvH}mm) is too short — aperture (${apertureH}mm) needs at least ${Math.round(apertureH + MIN_EDGE_COVERAGE * 2)}mm canvas height for ${MIN_EDGE_COVERAGE}mm coverage each edge.</div>`;
        } else if (topCoverageTight) {
          alertHTML += `<div class="alert warn">Top/Bottom: only ${topOverlap}mm coverage each edge — less than recommended ${bar}mm. Minimum is ${MIN_EDGE_COVERAGE}mm.</div>`;
        } else {
          alertHTML += `<div class="alert ok">Top/Bottom: ${topOverlap}mm coverage each edge.</div>`;
        }
      }
      if (c.canvH < apertureH) {
        alertHTML += `<div class="alert warn" style="background:rgba(204,51,51,0.15);border-color:rgba(204,51,51,0.6);">Height: aperture (${apertureH}mm) is taller than canvas inner height (${c.canvH}mm).</div>`;
      }
    }
    if (c.needsHorizBrace) alertHTML += `<div class="alert ok">Horizontal cross brace added (canvas >50mm taller than moving frame).</div>`;
    if (c.needsVertBrace) alertHTML += `<div class="alert ok">Vertical cross brace added (canvas >200mm wider than moving frame).</div>`;

  } else {
    const hookTop = c.hookTop;
    const bar_mm = CANVAS_FRAME;
    const canvTopRelFrame_mm = hookTop ? -bar_mm : c.frameH - c.outerCanvH + bar_mm;
    const canvBottomUp_mm = canvTopRelFrame_mm + c.outerCanvH;
    const motorH = c.motorH;
    const frameBottomUp_mm = c.frameH;
    const motorBottomFixed_mm = frameBottomUp_mm - c.motorOffset;
    const motorFixedTop_mm = motorBottomFixed_mm - motorH;
    const actualMotorToAperture = c.actualMotorToAperture;

    let apertureFixedTop_mm, requiredTravel, coverageOk, coverageTight, actualCoverage;
    if (!c.displayAbove) {
      const minApertureFromMotor_mm = motorBottomFixed_mm + actualMotorToAperture;
      const apertureFromCanvas_mm = canvBottomUp_mm + CANVAS_FRAME;
      apertureFixedTop_mm = Math.max(minApertureFromMotor_mm, apertureFromCanvas_mm);
      const apertureBottom_mm = apertureFixedTop_mm + apertureH;
      const distance = apertureBottom_mm - canvBottomUp_mm;
      requiredTravel = distance + MIN_EDGE_COVERAGE;
      actualCoverage = Math.round(c.travel - distance);
      coverageOk = c.travel >= requiredTravel;
      coverageTight = coverageOk && actualCoverage < CANVAS_FRAME;
    } else {
      const apertureBottom_above = motorFixedTop_mm - actualMotorToAperture;
      apertureFixedTop_mm = apertureBottom_above - apertureH;
      const canvTopRelFrame = hookTop ? -bar_mm : c.frameH - c.outerCanvH + bar_mm;
      const canvTopUp_mm = canvTopRelFrame;
      requiredTravel = canvTopUp_mm - apertureFixedTop_mm + MIN_EDGE_COVERAGE;
      actualCoverage = Math.round(apertureFixedTop_mm - canvTopUp_mm);

    }

      { label:'Aperture Width', val: apertureW ? apertureW + 'mm' : '-' },
      { label:'Aperture Height', val: apertureH ? apertureH + 'mm' : '-' },
      { label:'Aperture To Motor', val: Math.round(actualMotorToAperture) + 'mm' },
      { label:'Travel', val: c.travel + 'mm' },

    ];

    if (c.tvW > 0 && c.tvH > 0) {
      if (c.displayAbove) {
        if (coverageOk) {

        } else {
          alertHTML += `<div class="alert warn" style="background:rgba(204,51,51,0.15);border-color:rgba(204,51,51,0.6);">Coverage: canvas top does not reach aperture top — needs ${Math.round(requiredTravel)}mm higher (min 25mm overlap).</div>`;
        }
      } else {
        if (coverageOk) {

        } else {

      }

      }
    }
    if (c.needsCrossBrace) alertHTML += '<div class="alert ok">Cross brace added (canvas >50mm taller than moving frame).</div>';
  }

  box.innerHTML = rows.map(r =>
    '<div class="info-row"><span class="lbl">' + r.label + '</span><span class="val">' + r.val + '</span></div>'
  ).join('');
  alerts.innerHTML = alertHTML;
}

function draw() { drawFrame(animT); }

function drawFrame(t) {

function drawFrameSide(t, c) {
  const cnv = document.getElementById('vis');
  const container = cnv.parentElement;
  const DPR = window.devicePixelRatio || 1;
  const bar_mm = CANVAS_FRAME;
  const hookTop = c.hookTop;
  const mirrorLeft = c.displayAbove;
  const apertureH_mm = c.tvH > 0 ? c.tvH + c.apertureThick * 2 : c.frameH;
  const apertureW_mm = c.tvW > 0 ? c.tvW + c.apertureThick * 2 : 100;
  const tvH_mm = c.tvH;
  const tvW_mm = c.tvW;
  const plateW_mm = PICSIDE_PLATE_W;
  const plateH_mm = PICSIDE_PLATE_H;
  const canvTopRel_mm = hookTop ? -bar_mm : c.frameH - c.outerCanvH + bar_mm;
  const plateFixedCenterY_mm = c.frameH / 2;

  let plateFixedLeft_mm, frameLeftAt0_mm, apertureFixedLeft_mm, frameLeft_mm, canvOffX_mm, canvLeft_mm;

  if (!mirrorLeft) {
    plateFixedLeft_mm = 0;
    frameLeftAt0_mm = plateFixedLeft_mm + plateW_mm - c.frameW;
    frameLeft_mm = frameLeftAt0_mm + t * c.travel;
    canvOffX_mm = c.frameW - c.outerCanvW + bar_mm;
    canvLeft_mm = frameLeft_mm + canvOffX_mm;
    apertureFixedLeft_mm = plateFixedLeft_mm + plateW_mm + c.plateToAperture;
  } else {
    apertureFixedLeft_mm = 0;
    plateFixedLeft_mm = apertureFixedLeft_mm - c.plateToAperture - plateW_mm;
    frameLeftAt0_mm = apertureFixedLeft_mm - c.frameW;
    frameLeft_mm = frameLeftAt0_mm - t * c.travel;
    canvOffX_mm = c.frameW - bar_mm;
    canvLeft_mm = frameLeft_mm + canvOffX_mm;
  }

  const frameTop_mm = 0;
  const canvTop_mm = frameTop_mm + canvTopRel_mm;
  const canvCenterY_mm = canvTop_mm + c.outerCanvH / 2;
  const apertureTop_mm = canvCenterY_mm - apertureH_mm / 2;
  const plateTop_mm = plateFixedCenterY_mm - plateH_mm / 2;
  const tvLeft_mm = apertureFixedLeft_mm + c.apertureThick;
  const tvTop_mm = apertureTop_mm + c.apertureThick;

  let frameLeftFull_mm, frameRightFull_mm;
  if (!mirrorLeft) {
    frameLeftFull_mm = Math.min(frameLeftAt0_mm + canvOffX_mm, frameLeftAt0_mm);

    : Math.max(plateFixedLeft_mm + plateW_mm, frameRightFull_mm);

  const allTop = Math.min(plateTop_mm, canvTop_mm, apertureTop_mm, frameTop_mm);

  const sceneW_mm = fullRight_mm - fullLeft_mm;
  const sceneH_mm = allBottom - allTop;

  const DIM_BOTTOM = 70;
  const DIM_LEFT = 60;
  const DIM_RIGHT = 60;
  const PAD = 30;
  const containerW = container.clientWidth || 800;
  const containerH = container.clientHeight || 500;
  const scaleByW = (containerW - DIM_LEFT - DIM_RIGHT - PAD*2) / sceneW_mm;
  const scaleByH = (containerH - DIM_TOP - DIM_BOTTOM - PAD*2) / sceneH_mm;
  const SCALE = Math.min(scaleByW, scaleByH);

  ctx.clearRect(0, 0, containerW, containerH);
  ctx.fillStyle = '#f5f5f5'; ctx.fillRect(0, 0, containerW, containerH);

  function yOf(y_mm) { return originY + mm(y_mm); }

    ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 20;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 20; ctx.strokeRect(apX-10, apY-10, apW+20, apH+20);
    ctx.restore(); ctx.strokeStyle = '#f7f7f7'; ctx.lineWidth = 2; ctx.strokeRect(apX, apY, apW, apH);
    const tvX = xOf(tvLeft_mm), tvY = yOf(tvTop_mm), tvWpx = mm(tvW_mm), tvHpx = mm(tvH_mm);
    ctx.save(); ctx.beginPath(); ctx.roundRect(tvX, tvY, tvWpx, tvHpx, 2); ctx.clip();
    ctx.fillStyle = '#111'; ctx.fillRect(tvX, tvY, tvWpx, tvHpx);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 8; ctx.strokeRect(tvX+4, tvY+4, tvWpx-8, tvHpx-8); ctx.restore();
    const grad = ctx.createLinearGradient(tvX, tvY, tvX, tvY+tvHpx);
    grad.addColorStop(0,'rgba(255,255,255,0.06)'); grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = grad; ctx.fillRect(tvX, tvY, tvWpx, tvHpx);
    lbl(ctx, c.tvW+' x '+c.tvH+'mm', tvX+tvWpx/2, tvY+tvHpx/2+4, '#fff', '0.63rem');
  } else {
    const apX = xOf(apertureFixedLeft_mm), apY = yOf(apertureTop_mm);
    const apW = mm(apertureW_mm), apH = mm(apertureH_mm);
    ctx.fillStyle = '#e8e8e8'; ctx.fillRect(apX, apY, apW, apH);
    ctx.save(); let region = new Path2D(); region.rect(apX, apY, apW, apH); ctx.clip(region);
    ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 20;
    ctx.strokeStyle = '#000'; ctx.lineWidth = 20; ctx.strokeRect(apX-10, apY-10, apW+20, apH+20);

function exportPICProof(c) {
  const GAP = 60, TOP_H = 160, BOTTOM_H = 80, TITLE_H = 36;
  const LEFT_DIM = 110, RIGHT_DIM = 150, TOP_DIM = 60, BOT_DIM = 100;
  const FRAME_DIM_PAD = 90;
  const apertureH_mm = c.tvH > 0 ? c.tvH + c.apertureThick * 2 : 60;
  const apertureW_mm = c.tvW > 0 ? c.tvW + c.apertureThick * 2 : 100;
  const canvOffY_mm = c.hookTop ? -CANVAS_FRAME : c.frameH - c.outerCanvH + CANVAS_FRAME;
  const motorH_mm = c.motorH, motorW_mm = c.motorW;
  const actualMotorToAperture_mm = c.actualMotorToAperture;
  const frameBottomUp_mm = c.frameH;
  const motorBottomFixed_mm = frameBottomUp_mm - c.motorOffset;
  const motorFixedTop_mm = motorBottomFixed_mm - motorH_mm;
  const canvBottomUp_mm = canvOffY_mm + c.outerCanvH;
  const apertureFixedTop_mm = !c.displayAbove
    ? Math.max(motorBottomFixed_mm + actualMotorToAperture_mm, canvBottomUp_mm + CANVAS_FRAME)
    : (motorFixedTop_mm - actualMotorToAperture_mm - apertureH_mm);
  const tvTop_mm = apertureFixedTop_mm + c.apertureThick;
  const canvTopUp_mm = canvOffY_mm;

    const hp = Math.min(0, canvTopUp_mm, apertureFixedTop_mm);
    const lp = Math.max(c.frameH, canvBottom, apertureFixedTop_mm + apertureH_mm, motorBottomFixed_mm);
    return { hp, lp, totalH: lp - hp, maxW: Math.max(c.frameW, c.outerCanvW, apertureW_mm, motorW_mm) };
  }

  pc.font = '16px Arial'; pc.fillStyle = '#555';
  let presetLabel = 'Canvas '+c.canvW+' × '+c.canvH+'mm (outer '+c.outerCanvW+' × '+c.outerCanvH+'mm) | Frame '+c.frameW+' × '+c.frameH+'mm | Travel '+c.travel+'mm';
  if (c.tvW > 0 && c.tvH > 0) presetLabel += ' | TV '+c.tvW+' × '+c.tvH+'mm | Aperture thickness '+c.apertureThick+'mm';
  presetLabel += ' | Canvas profile '+CANVAS_FRAME+'mm × '+CANVAS_FRAME+'mm';

  function renderPanel(tVal, mode) {

    const fStroke_mm = FRAME_STROKE, bar_mm = CANVAS_FRAME, hookTop = c.hookTop, displayAbove = c.displayAbove, t = tVal;
    const SCALE = mode === 'FRAME' ? scaleFrame : scaleUpDown;

    const frameLeft = cx - mm(c.frameW/2), frameTop = yOf(frameMovedTop_mm);

    const outerCW = mm(c.outerCanvW), outerCH = mm(c.outerCanvH), bar = mm(bar_mm);

        dimArrow(ctx, xOf(frameLeftAt0_mm), tY, xOf(frameLeftAt0_mm+t*c.travel), tY, ('travel '+Math.round(t*c.travel)+'mm').toUpperCase(), '#cc3333', '#cc3333', 'h');
      } else {
        dimArrow(ctx, xOf(frameLeftAt0_mm-t*c.travel), tY, xOf(frameLeftAt0_mm), tY, ('travel '+Math.round(t*c.travel)+'mm').toUpperCase(), '#cc3333', '#cc3333', 'h');
      }
    }

    if (c.tvW > 0 && c.tvH > 0) {
      const dimBelowY = apY + apH + 28;
      dimArrow(ctx, apX, dimBelowY, apX+apW, dimBelowY, (Math.round(apertureW_mm)+'mm aperture').toUpperCase(), '#000', '#000', 'h');
      if (!mirrorLeft) {
        const plateRightX = xOf(plateFixedLeft_mm+plateW_mm);
        dimArrow(ctx, plateRightX, dimBelowY+28, apX, dimBelowY+28, (Math.round(c.plateToAperture)+'mm plate-aperture').toUpperCase(), '#555', '#555', 'h');
      } else {
        const plateLeftX = xOf(plateFixedLeft_mm);
        dimArrow(ctx, apX+apW, dimBelowY+28, plateLeftX, dimBelowY+28, (Math.round(c.plateToAperture)+'mm plate-aperture').toUpperCase(), '#555', '#555', 'h');
      }
    }
    return offscreen;
  }

  const mirrorLeft = c.displayAbove;
  const leftLabel = mirrorLeft ? 'CLOSED POSITION' : 'OPEN POSITION';
  const rightLabel = mirrorLeft ? 'OPEN POSITION' : 'CLOSED POSITION';
  const leftPanel = renderSidePanel(0, 'LEFT');
  const rightPanel = renderSidePanel(1, 'RIGHT');
  const canvasPanel = renderSidePanel(0, 'CANVAS');
  const startX = (PROOF_W - (PANEL_W*3+GAP*2)) / 2;
  const panelY = TOP_H + TITLE_H;
  pc.font = 'bold 22px Arial'; pc.fillStyle = '#000'; pc.textAlign = 'center';
  pc.fillText(leftLabel, startX+PANEL_W/2, TOP_H+TITLE_H-10);
  pc.fillText(rightLabel, startX+PANEL_W+GAP+PANEL_W/2, TOP_H+TITLE_H-10);
  pc.fillText('CANVAS DETAILS', startX+(PANEL_W+GAP)*2+PANEL_W/2, TOP_H+TITLE_H-10);
  pc.drawImage(leftPanel, startX, panelY, PANEL_W, PANEL_W);
  pc.drawImage(rightPanel, startX+PANEL_W+GAP, panelY, PANEL_W, PANEL_W);
  pc.drawImage(canvasPanel, startX+(PANEL_W+GAP)*2, panelY, PANEL_W, PANEL_W);
  pc.font = '13px Arial'; pc.fillStyle = '#888'; pc.textAlign = 'center'; pc.fillText('PIC Mechanism Visualiser — Future Automation', PROOF_W/2, panelY+PANEL_W+50);
  const a = document.createElement('a'); a.href = proof.toDataURL('image/jpeg', 0.93); a.download = activePreset+' GUIDE.jpg'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

document.getElementById('exportProofBtn').addEventListener('click', exportMechanismProof);
buildTVSelector(); buildPresets(); syncMotorTubeFields(); updateSidebarForMode(); updateInfo(); draw();
window.addEventListener('resize', draw);
</script>
